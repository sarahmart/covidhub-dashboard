name: "Rebuild Data"
on:
  schedule:
    - cron: "33 17 * * 4" # every Thursday at 5:45PM UTC == 12:33PM EST
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - predtimechart-config.yml
      - predevals-config.yml
      - predtimechart-config-*.yml
      - predevals-config-*.yml
      - scripts/fetch_and_prepare_data.py
  workflow_dispatch:
    inputs:
      regenerate:
        description: "(Forecast) Regenerate previously-recorded model output data?"
        type: boolean
        required: false
        default: false
      data:
        description: "(Forecast) Which forecast page data should be built?"
        type: choice
        options:
          - 'target'
          - 'forecast'
          - 'both'
        required: false
        default: 'both'
      publish:
        description: "Push Data to branch (uncheck for a dry run)"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

jobs:
  fetch-google-research-data:
    runs-on: ubuntu-latest
    name: "Fetch Google Research and CDC data"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyarrow

      - name: Fetch and prepare data
        run: |
          python scripts/fetch_and_prepare_data.py

      - name: Data fetch complete
        run: |
          echo "Forecasts and targets fetched successfully"
          echo "Ready for Hubverse evaluation"

  site:
    needs: fetch-google-research-data
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up R
        uses: r-lib/setup-r@v2
        
      - name: Install R system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev cmake
          
      - name: Install R packages
        run: R -e 'install.packages(c("tidyverse", "arrow", "yaml", "ggplot2"), repos="http://cran.us.r-project.org")'
        
      - name: Run evaluation script
        run: Rscript scripts/evaluate_forecasts.R
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        
      - name: Publish Quarto Dashboard
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
