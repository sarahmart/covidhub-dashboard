name: "Rebuild Data"
on:
  schedule:
    - cron: "33 17 * * 4" # every Thursday at 5:45PM UTC == 12:33PM EST
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - predtimechart-config.yml
      - predevals-config.yml
      - predtimechart-config-*.yml
      - predevals-config-*.yml
      - scripts/fetch_and_prepare_data.py
  workflow_dispatch:
    inputs:
      regenerate:
        description: "(Forecast) Regenerate previously-recorded model output data?"
        type: boolean
        required: false
        default: false
      data:
        description: "(Forecast) Which forecast page data should be built?"
        type: choice
        options:
          - 'target'
          - 'forecast'
          - 'both'
        required: false
        default: 'both'
      publish:
        description: "Push Data to branch (uncheck for a dry run)"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

jobs:
  fetch-google-research-data:
    runs-on: ubuntu-latest
    name: "Fetch Google Research and CDC data"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyarrow

      - name: Fetch and prepare data
        run: |
          python scripts/fetch_and_prepare_data.py

      - name: Commit and push data updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/forecasts/ data/targets/
          git commit -m "Update forecasts and targets from Google Research and CDC hubs" || echo "No changes to commit"
          git push origin ${{ github.head_ref || github.ref_name }}

  site:
    needs: fetch-google-research-data
    uses: hubverse-org/hub-dashboard-control-room/.github/workflows/generate-data.yaml@main
    with:
      owner: '${{ github.event.repository.owner.login }}'
      name: '${{ github.event.repository.name }}'
      slug: '${{ github.event.repository.owner.login }}'
      email: '${{ github.event.repository.owner.id }}+${{ github.event.repository.owner.login }}@users.noreply.github.com'
      regenerate: ${{ inputs.regenerate || false }}
      build: ${{ inputs.data || 'both' }}
      publish: ${{ inputs.publish || github.event_name == 'schedule' || github.event_name == 'push' }}
    secrets:
      id: 'none'
      key: ${{ secrets.GITHUB_TOKEN }}
